/* SAVE API KEY */  
  
window.onload = function(){  
  
  const savedKey = localStorage.getItem("groq_api");  
  
  if(savedKey){  
    document.getElementById("apiKey").value = savedKey;  
  }  
  
}  
  
/* COPY SYSTEM */  
  
async function copyText(text){  
  
  try{  
  
    await navigator.clipboard.writeText(text);  
  
  }  
  
  catch{  
  
    const temp = document.createElement("textarea");  
  
    temp.value = text;  
  
    document.body.appendChild(temp);  
  
    temp.select();  
  
    document.execCommand("copy");  
  
    document.body.removeChild(temp);  
  
  }  
  
}  
  
/* MANUAL COPY */  
  
async function manualCopy(){  
  
  const text =  
  document.getElementById('output').innerText;  
  
  if(  
    !text ||  
    text === 'Hasil translate muncul di sini...'  
  ){  
  
    alert('Belum ada hasil');  
    return;  
  
  }  
  
  await copyText(text);  
  
  alert('Berhasil di copy!');  
  
}  
  
/* QUICK CLEAR */  
  
function quickClear(){  
  
  document.getElementById('input').value = '';  
  
  document.getElementById('output').innerText =  
  'Hasil translate muncul di sini...';  
  
}  
  
/* AUTO RP DETECT */  
  
function detectPrompt(text, mode){  
  
  const lower = text.toLowerCase();  
  
  let rpStyle = '';  
  
  if(lower.startsWith('/me')){  
  
    rpStyle =  
    'Keep roleplay /me format action style.';  
  
  }  
  
  else if(lower.startsWith('/do')){  
  
    rpStyle =  
    'Keep roleplay /do descriptive style.';  
  
  }  
  
  else if(lower.startsWith('/w')){  
  
    rpStyle =  
    'Keep whisper roleplay tone.';  
  
  }  
  
  else if(lower.startsWith('/r')){  
  
    rpStyle =  
    'Keep radio communication style.';  
  
  }  
  
  else if(lower.startsWith('/f')){  
  
    rpStyle =  
    'Keep faction communication style.';  
  
  }  
  
  else if(lower.startsWith('/d')){  
  
    rpStyle =  
    'Keep department communication style.';  
  }  
  
  let basePrompt = '';  
  
  if(mode === 'casual'){  
  
    basePrompt = `  
Translate Indonesian into natural casual American slang.  
  
Style:  
- casual  
- texting vibe  
- smooth  
- short  
  
Rules:  
- translation only  
- no explanation  
  
${rpStyle}  
`;  
  
  }  
  
  if(mode === 'gangster'){  
  
    basePrompt = `  
Translate Indonesian into American street slang.  
  
Style:  
- gangster-ish  
- hood slang  
- smooth  
- natural  
  
Rules:  
- translation only  
- no explanation  
  
${rpStyle}  
`;  
  
  }  
  
  if(mode === 'formal'){  
  
    basePrompt = `  
Translate Indonesian into proper formal English.  
  
Style:  
- formal  
- professional  
- clear  
  
Rules:  
- translation only  
  
${rpStyle}  
`;  
  
  }  
  
  return basePrompt;  
  
}  
  
/* MAIN TRANSLATE */  
  
async function translateText(mode){  
  
  const apiKey =  
  document.getElementById('apiKey').value.trim();  
  
  const input =  
  document.getElementById('input').value.trim();  
  
  const output =  
  document.getElementById('output');  
  
  if(!apiKey){  
  
    alert('Masukkan API Key dulu');  
    return;  
  
  }  
  
  if(!input){  
  
    alert('Masukkan text dulu');  
    return;  
  
  }  
  
  /* SAVE API KEY */  
  
  localStorage.setItem("groq_api", apiKey);  
  
  output.innerText = 'Loading...';  
  
  const prompt = detectPrompt(input, mode);  
  
  try{  
  
    const response = await fetch(  
      'https://api.groq.com/openai/v1/chat/completions',  
    {  
  
      method:'POST',  
  
      headers:{  
        'Authorization':`Bearer ${apiKey}`,  
        'Content-Type':'application/json'  
      },  
  
      body:JSON.stringify({  
  
        model:'llama-3.3-70b-versatile',  
  
        messages:[  
          {  
            role:'system',  
            content:prompt  
          },  
          {  
            role:'user',  
            content:input  
          }  
        ],  
  
        temperature:0.5,  
        max_tokens:100  
  
      })  
  
    });  
  
    const data = await response.json();  
  
    const result =  
    data.choices[0].message.content;  
  
    output.innerText = result;  
  
    await copyText(result);  
  
  }  
  
  catch(err){  
  
    output.innerText =  
    'Error: ' + err;  
  
  }  
  
}
